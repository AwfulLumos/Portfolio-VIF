<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | VIF.Dev</title>
    
    <meta name="description" content="Oops! The page you're looking for doesn't exist." />
    <meta name="robots" content="noindex, nofollow" />
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css"
    />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <style>
      :root {
        --color-primary: #313647;
        --color-accent: #A3B087;
        --color-accent-secondary: #FFF8D4;
        --color-text-light: #FFF8D4;
        --color-text-muted: #a8b4bc;
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(-45deg, #313647, #3a4050, #435663, #2c3240);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        color: var(--color-text-light);
        text-align: center;
        padding: 2rem;
      }
      
      @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      
      .error-container {
        max-width: 600px;
      }
      
      .error-code {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(6rem, 20vw, 12rem);
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(135deg, var(--color-accent), var(--color-accent-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
        animation: float 3s ease-in-out infinite;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      .error-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 600;
        margin-bottom: 1rem;
      }
      
      .error-message {
        font-size: 1.1rem;
        color: var(--color-text-muted);
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      
      .error-actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.875rem 1.75rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 30px;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
        border: none;
      }
      
      .btn-primary {
        background: linear-gradient(135deg, var(--color-accent), var(--color-accent-secondary));
        color: #313647;
        box-shadow: 0 0 30px rgba(163, 176, 135, 0.3);
      }
      
      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(163, 176, 135, 0.4);
      }
      
      .btn-outline {
        background: transparent;
        border: 2px solid var(--color-accent);
        color: var(--color-accent);
      }
      
      .btn-outline:hover {
        background: var(--color-accent);
        color: var(--color-primary);
        transform: translateY(-3px);
      }
      
      .decorative-elements {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: -1;
      }
      
      .floating-shape {
        position: absolute;
        border-radius: 50%;
        opacity: 0.1;
        animation: floatRandom 20s ease-in-out infinite;
      }
      
      .shape-1 {
        width: 300px;
        height: 300px;
        background: var(--color-accent);
        top: -100px;
        left: -100px;
        animation-delay: 0s;
      }
      
      .shape-2 {
        width: 200px;
        height: 200px;
        background: var(--color-accent-secondary);
        bottom: -50px;
        right: -50px;
        animation-delay: -5s;
      }
      
      .shape-3 {
        width: 150px;
        height: 150px;
        background: var(--color-accent);
        top: 50%;
        right: 10%;
        animation-delay: -10s;
      }
      
      @keyframes floatRandom {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(30px, -30px) rotate(90deg); }
        50% { transform: translate(-20px, 20px) rotate(180deg); }
        75% { transform: translate(20px, 30px) rotate(270deg); }
      }
      
      .home-hint {
        margin-top: 3rem;
        font-size: 0.9rem;
        color: var(--color-text-muted);
      }
      
      .home-hint a {
        color: var(--color-accent);
        text-decoration: none;
      }
      
      .home-hint a:hover {
        text-decoration: underline;
      }
      
      @media (max-width: 576px) {
        .error-actions {
          flex-direction: column;
          align-items: center;
        }
        
        .btn {
          width: 100%;
          max-width: 250px;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="decorative-elements">
      <div class="floating-shape shape-1"></div>
      <div class="floating-shape shape-2"></div>
      <div class="floating-shape shape-3"></div>
    </div>
    
    <div class="error-container">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-message">
        Oops! The page you're looking for seems to have wandered off into the digital void. 
        Don't worry, even the best explorers get lost sometimes.
      </p>
      
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">
          <i class="bi bi-house-door"></i>
          Go Home
        </a>
        <a href="index.html#contact" class="btn btn-outline">
          <i class="bi bi-envelope"></i>
          Contact Me
        </a>
      </div>
      
      <p class="home-hint">
        Or explore my <a href="index.html#projects">projects</a> and <a href="index.html#skills">skills</a>
      </p>
    </div>
  </body>
</html>
