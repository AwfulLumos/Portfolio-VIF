<!-- Hero Section Component -->
<section id="hero" class="hero-section">
  <!-- Aurora gradient blobs -->
  <div class="aurora-blob-1" aria-hidden="true"></div>
  <div class="aurora-blob-2" aria-hidden="true"></div>
  <div class="aurora-blob-3" aria-hidden="true"></div>
  <div class="container">
    <div class="hero-content">
      <div class="hero-badge">
        <span class="status-dot"></span>
        <span data-i18n="hero.badge">Open for Work</span>
      </div>

      <h1 class="hero-title">
        <span data-i18n="hero.greeting">Hi, I'm</span> <span class="highlight">Voun Irish Florence Dejumo</span>
      </h1>

      <p class="hero-subtitle">
        <span class="typed-text" id="typedText"></span><span class="typed-cursor">|</span>
      </p>

      <div class="hero-buttons">
        <a href="#projects" class="btn btn-primary">
          <i class="bi bi-folder"></i>
          <span data-i18n="hero.viewWork">View My Work</span>
        </a>
        <a href="#contact" class="btn btn-outline">
          <i class="bi bi-envelope"></i>
          <span data-i18n="hero.getInTouch">Get in Touch</span>
        </a>
      </div>
    </div>

    <div class="scroll-indicator">
      <a href="#about">
        <div class="mouse"></div>
        <span data-i18n="hero.scrollDown">Scroll Down</span>
      </a>
    </div>
  </div>
</section>
